[project]
name = "jw-rag"
version = "0.1.0"
description = "Vector indexing and retrieval over jw.org corpus"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "jw-core",
    "numpy>=2.0.0",
    "rank-bm25>=0.2.2",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
# Legacy aliases kept for backwards compat with Fase 6 docs:
openai = ["openai>=1.50.0"]
local = ["sentence-transformers>=3.0.0"]

# Fase 33: real embed + rerank stack.
embeddings-local = [
    "sentence-transformers>=3.0.0",
]
embeddings-api = [
    "cohere>=5.5.0",
    "voyageai>=0.2.3",
]
rerank-local = [
    "sentence-transformers>=3.0.0",
]
rerank-api = [
    "cohere>=5.5.0",
]

# Fase 37: visual late-interaction (ColPali / ColQwen2) — opt-in, GPU required.
visual = [
    "colpali-engine>=0.3.4",
    "transformers>=4.45.0",
    "torch>=2.4.0",
    "pdf2image>=1.17.0",
    "Pillow>=10.4.0",
    "playwright>=1.47.0",
]
visual-mlx = [
    "mlx>=0.18.0",
    "mlx-vlm>=0.0.13",
    "Pillow>=10.4.0",
    "pdf2image>=1.17.0",
    "playwright>=1.47.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_rag"]

[tool.pytest.ini_options]
markers = [
    "embeddings_local: tests that require sentence-transformers + a local model download",
    "rerank_local: tests that require a local cross-encoder model download",
]
