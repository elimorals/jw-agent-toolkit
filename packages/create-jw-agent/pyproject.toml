[project]
name = "create-jw-agent"
version = "0.1.0"
description = "Scaffolder for jw-agent-toolkit plugins. uvx create-jw-agent my-thing"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
authors = [
    { name = "Elias", email = "elias@cipreholding.com" }
]
dependencies = [
    "typer>=0.13.0",
    "jinja2>=3.1.0",
    "rich>=13.9.0",
]

[project.optional-dependencies]
pypi-check = ["httpx>=0.27.0"]

[project.scripts]
create-jw-agent = "create_jw_agent.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/create_jw_agent"]
