# Agent: study_conductor.prepare_lesson(pub_code, chapter, language).
# Without a local JWPUB the agent falls back to WOL and emits source=wol_chapter.
# CI runs offline-by-default, so we assert the offline path. The JWPUB-local
# path (source=jwpub_chapter) is covered by jw-core unit tests where we can
# stage a fixture JWPUB.
id: l1_study_conductor_lff_ch1_es
agent: study_conductor
layer: l1
input:
  pub_code: lff
  chapter: 1
  language: es
expected:
  min_findings: 1
  must_have_source: wol_chapter
  must_have_citation: true
  forbidden_keywords_in_findings:
    - "supuestamente"
    - "tal vez"
    - "talvez"
metadata:
  topic: study_book.lff.ch1
  added_by: elias
  added_at: 2026-05-30
