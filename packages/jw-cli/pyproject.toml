[project]
name = "jw-cli"
version = "0.1.0"
description = "CLI for jw-agent-toolkit"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "jw-core",
    "jw-eval",
    "typer>=0.13.0",
    "rich>=13.9.0",
]

[project.scripts]
jw = "jw_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_cli"]
