[project]
name = "jw-brain-finance-plugin"
version = "0.1.0"
description = "Financial second-brain domain (Fase 49 fixture)."
requires-python = ">=3.13"
dependencies = []

[project.entry-points."jw_agent_toolkit.brain_domains"]
finance = "jw_brain_finance.domain:FinanceBrainDomain"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_brain_finance"]
