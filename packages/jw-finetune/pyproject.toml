[project]
name = "jw-finetune"
version = "0.1.0"
description = "Local fine-tuning platform for JW publications, powered by Unsloth"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "jw-core",
    "jw-rag",
    "jw-eval",  # F77: principles loader (canonical home of fidelity principles)
    "typer>=0.12.0",
    "rich>=13.0.0",
    "jinja2>=3.1.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
# GPU stacks (Unsloth + transformers + trl + datasets). Choose ONE per machine.
cuda  = ["unsloth", "bitsandbytes", "trl>=0.11.0", "transformers>=4.45.0", "datasets>=3.0.0", "accelerate>=0.34.0"]
mlx   = ["mlx>=0.18.0", "mlx-lm>=0.18.0", "transformers>=4.45.0", "datasets>=3.0.0"]
rocm  = ["unsloth", "trl>=0.11.0", "transformers>=4.45.0", "datasets>=3.0.0", "accelerate>=0.34.0"]
# Q&A synthesis providers (independent of GPU stack).
synth = ["anthropic>=0.40.0", "ollama>=0.4.0", "langdetect>=1.0.9"]
# Monitor dashboard (F2; declared here for future).
monitor = ["fastapi>=0.115.0", "uvicorn>=0.32.0", "websockets>=13.0", "psutil>=5.9.5,<8"]
tui = ["textual>=0.85.0", "psutil>=5.9.5,<8"]

[project.scripts]
jw-finetune = "jw_finetune.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_finetune"]
