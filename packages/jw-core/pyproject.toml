[project]
name = "jw-core"
version = "0.1.0"
description = "Core library for jw-agent-toolkit: API clients, parsers, models"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "pydantic>=2.9.0",
    "brotli>=1.1.0",
    "defusedxml>=0.7.1",
    "jinja2>=3.1.3",
]

[project.optional-dependencies]
pdf = [
    "weasyprint>=62.3",
]
docx = [
    "python-docx>=1.1.0",
]
anki = [
    "genanki>=0.13.1,<1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_core"]
