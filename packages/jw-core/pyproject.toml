[project]
name = "jw-core"
version = "0.1.0"
description = "Core library for jw-agent-toolkit: API clients, parsers, models"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "httpx>=0.27.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "pydantic>=2.9.0",
    "brotli>=1.1.0",
    "defusedxml>=0.7.1",
    "jinja2>=3.1.3",
    "Pillow>=10.0.0",
]

[project.optional-dependencies]
pdf = [
    "weasyprint>=62.3",
]
docx = [
    "python-docx>=1.1.0",
]
anki = [
    "genanki>=0.13.1,<1.0",
]
tts-kokoro = [
    "huggingface_hub>=0.24.0",
    "onnxruntime>=1.19.0",
    "soundfile>=0.12.1",
    "numpy>=1.26.0",
]
tts-xtts = ["coqui-tts>=0.24.0"]
tts-f5 = ["f5-tts>=0.4.0"]
tts-elevenlabs = ["elevenlabs>=1.5.0"]
asr-deepgram = ["deepgram-sdk>=3.7.0"]
asr-turbo = ["faster-whisper>=1.1.0"]
tts-premium = ["jw-core[tts-kokoro,tts-elevenlabs]"]
asr-premium = ["jw-core[asr-turbo,asr-deepgram]"]
audio-premium = ["jw-core[tts-kokoro,asr-turbo]"]
grammar-claude = [
    "anthropic>=0.34.0,<1.0",
]
grammar-openai = [
    "openai>=1.40.0",
]
grammar-local = [
    "llama-cpp-python>=0.2.78",
]
vlm-anthropic = [
    "anthropic>=0.34.0",
]
vlm-openai = [
    "openai>=1.40.0",
]
vlm-api-qwen = [
    "httpx>=0.27.0",
]
vlm-mlx = [
    "mlx-vlm>=0.1.0",
    "Pillow>=10.0.0",
]
vlm-nvidia = [
    "vllm>=0.6.0",
    "Pillow>=10.0.0",
]
vlm-cpu = [
    "llama-cpp-python>=0.3.0",
    "Pillow>=10.0.0",
]
vlm-tesseract = [
    "pytesseract>=0.3.10",
    "Pillow>=10.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_core"]
