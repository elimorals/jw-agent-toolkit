[project]
name = "jw-mcp"
version = "0.1.0"
description = "MCP server exposing jw-agent-toolkit tools to LLMs"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "jw-core",
    "jw-rag",
    "jw-agents",
    "jw-eval",
    "fastmcp>=2.0.0",
]

[project.scripts]
jw-mcp = "jw_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_mcp"]
