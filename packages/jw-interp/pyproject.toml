[project]
name = "jw-interp"
version = "0.1.0"
description = "Mechanistic interpretability for JW fine-tuned models — probing, steering, SAE feature discovery (F80)"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
dependencies = [
    "jw-eval",
    "numpy>=1.26",
    "scikit-learn>=1.5",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
torch = [
    # CUDA / MPS inference + nnsight intervention. Heavy install; opt-in.
    "torch>=2.4.0",
    "transformers>=4.45.0",
    "nnsight>=0.3.0",
]
sae = [
    # SAELens (Gemma Scope native) + Qwen-Scope is plain torch.load
    "sae-lens>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jw_interp"]
